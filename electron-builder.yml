appId: com.kwyeh.vibeflow
productName: VibeFlow
copyright: Copyright © 2026 KW-Yeh
# node-pty ships prebuilt binaries for every target we package (darwin/win,
# x64/arm64) and they load fine against the pinned Electron. Skip electron-builder's
# from-source native rebuild: on Windows it fails inside node-pty's bundled winpty
# build (GetCommitHash.bat), and the rebuild is unnecessary given the prebuilds.
npmRebuild: false
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
# Distinguish artifacts per platform/arch so a single GitHub Release can host them all.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
# Squeeze the installer/archive harder — slower to build, smaller to download.
compression: maximum
# Chromium ships ~220 UI locale packs (~47 MB). The app itself only speaks
# English + Chinese, so drop the rest from the Electron Framework.
electronLanguages:
  - en-US
  - zh-CN
  - zh-TW
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  category: Development
  target:
    - AppImage
# Upload artifacts to GitHub Releases. electron-builder only publishes when
# --publish is passed explicitly (CI does this); local `npm run build` never uploads.
publish:
  provider: github
  owner: KW-Yeh
  repo: VibeFlow
  # CI uploads artifacts to a *draft* release — review it, then click Publish.
  releaseType: draft
